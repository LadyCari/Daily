<ion-header>
  <ion-toolbar>
    <ion-title><i class="fa-regular fa-clock modal-accent-icon"></i> Nuevo horario</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="floating-input-wrapper" [class.invalid-field]="submitAttempted && (!title || !title.trim())">
    <input class="floating-input" id="inputTituloHorario" type="text" [(ngModel)]="title" placeholder=" " />
    <label class="floating-label" for="inputTituloHorario">Titulo del horario</label>
  </div>

  <!-- Días múltiples -->
  <div class="dias-label" [style.color]="submitAttempted && weekdays.length === 0 ? 'var(--app-danger, #ff6464)' : ''">Día(s) de la semana</div>
  <div class="dias-chips">
    <div *ngFor="let dia of DIAS" class="dia-chip" [class.activo]="isDiaSeleccionado(dia.value)"
      (click)="toggleDia(dia.value)">
      {{ dia.label }}
    </div>
  </div>

  <div class="time-input-wrapper" [class.invalid-field]="submitAttempted && !startHour">
    <label class="time-label">Hora inicio</label>
    <input class="time-input" type="time" [(ngModel)]="startHour" />
  </div>

  <div class="time-input-wrapper">
    <label class="time-label">Hora fin (opcional)</label>
    <input class="time-input" type="time" [(ngModel)]="endHour" />
  </div>

  <div class="privacy-toggle" (click)="isPrivate = !isPrivate">
    <i class="fa-solid" [class.fa-lock]="isPrivate" [class.fa-lock-open]="!isPrivate" [class.privacy-on]="isPrivate"></i>
    <span [class.privacy-on]="isPrivate">{{ isPrivate ? 'Privado (solo vos lo ves)' : 'Compartido con tu pareja' }}</span>
  </div>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <div id="botodonesNuevoHorario">
      <ion-button fill="outline" color="neon" (click)="cancel()" id="botonCancelar" style="--border-width: 1px;">Cancelar</ion-button>
      <ion-button color="neon" (click)="save()" id="botonGuardar">Guardar</ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
